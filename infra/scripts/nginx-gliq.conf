# nginx site for Component A — greenlightiq.fredt.io
#
# Install to /etc/nginx/sites-available/gliq and symlink into sites-enabled.
# ➡️ docs/DEPLOYMENT.md step 5 for the full runbook.
#
# ⚠️ This is the PRE-TLS template. `certbot --nginx` rewrites this file in
# place: it adds the listen 443 block, the certificate paths, and a redirect
# from :80. After certbot runs, the file on the VM will NOT match this one —
# that is expected, and this stays as the reproducible starting point rather
# than a mirror of the deployed state.
#
# ⚠️ nginx config lives outside /opt/gliq, so `deploy.sh` never touches it and
# it survives every deploy. It does NOT survive VM recreation, because
# node-startup.sh does not provision nginx.

server {
    listen 80;
    listen [::]:80;
    server_name greenlightiq.fredt.io;

    # Design documents are prose. 2MB is generous for text and small enough
    # that an upload cannot be used to fill a 20GB boot disk.
    client_max_body_size 2M;

    # Do not advertise the nginx version to the internet.
    server_tokens off;

    access_log /var/log/nginx/gliq-access.log;
    error_log  /var/log/nginx/gliq-error.log;

    location / {
        # uvicorn is bound to loopback by the systemd unit, deliberately —
        # binding 0.0.0.0 would expose it directly on the VM's static IP.
        proxy_pass http://127.0.0.1:8000;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

        # ⚠️ Load-bearing for the session cookie. The app sets it with
        # https_only=True; without this header the app sees a plain-HTTP
        # request from the proxy and the cookie is dropped, which presents as
        # "login succeeds but every page bounces back to the login form".
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
    }
}
