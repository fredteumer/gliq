# Alembic configuration.
#
# The database URL is deliberately NOT set here. It is built at runtime in
# data/migrations/env.py from shared/config.py, so there is exactly one place
# connection details come from — the Pulumi stack, via env-from-stack.py.
# A url in this file would be a second source of truth, and a committed
# password waiting to happen.

[alembic]
script_location = data/migrations
prepend_sys_path = .

# Timestamped filenames so migrations sort chronologically on disk.
file_template = %%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
